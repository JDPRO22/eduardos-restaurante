name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gerar js/config.js a partir de Secrets
        run: |
          mkdir -p js
          cat > js/config.js <<'EOF'
          window.APP_CONFIG = {
            firebase: {
              apiKey: ${{ toJson(secrets.FIREBASE_API_KEY) }},
              authDomain: ${{ toJson(secrets.FIREBASE_AUTH_DOMAIN) }},
              projectId: ${{ toJson(secrets.FIREBASE_PROJECT_ID) }},
              storageBucket: ${{ toJson(secrets.FIREBASE_STORAGE_BUCKET) }},
              messagingSenderId: ${{ toJson(secrets.FIREBASE_MESSAGING_SENDER_ID) }},
              appId: ${{ toJson(secrets.FIREBASE_APP_ID) }}
            }
          };
          EOF
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'
          channelId: live
